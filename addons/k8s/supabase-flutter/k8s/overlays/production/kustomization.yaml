apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: {{ project_slug }}-production
namePrefix: prod-

resources:
  - ../../base
  - namespace.yaml
  - ingress.yaml

commonLabels:
  environment: production

patches:
  - target:
      kind: Deployment
      name: postgrest
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
