# Routes the public API hostname to PostgREST (and /auth to GoTrue). Adjust the
# ingressClassName + host + TLS for your cluster/controller.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ project_slug }}-api
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: api.{{ project_slug }}.example.com
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: gotrue
                port:
                  number: 9999
          - path: /
            pathType: Prefix
            backend:
              service:
                name: postgrest
                port:
                  number: 3000
