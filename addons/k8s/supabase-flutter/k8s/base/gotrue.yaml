apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotrue
  labels:
    app.kubernetes.io/name: gotrue
    app.kubernetes.io/component: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gotrue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gotrue
        app.kubernetes.io/component: auth
    spec:
      containers:
        - name: gotrue
          image: supabase/gotrue:v2.191.0
          ports:
            - containerPort: 9999
              name: http
          env:
            - name: GOTRUE_DB_DRIVER
              value: "postgres"
            - name: GOTRUE_DB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ project_slug }}-secrets
                  key: GOTRUE_DB_DATABASE_URL
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ project_slug }}-secrets
                  key: JWT_SECRET
            - name: GOTRUE_SITE_URL
              value: "https://{{ project_slug }}.example.com"
            - name: API_EXTERNAL_URL
              value: "https://{{ project_slug }}.example.com"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: gotrue
spec:
  selector:
    app.kubernetes.io/name: gotrue
  ports:
    - port: 9999
      targetPort: 9999
      name: http
