apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
  labels:
    app.kubernetes.io/name: postgrest
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgrest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgrest
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: postgrest
          image: postgrest/postgrest:v12.0.1
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PGRST_DB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ project_slug }}-secrets
                  key: PGRST_DB_URI
            - name: PGRST_DB_SCHEMAS
              value: "public"
            - name: PGRST_DB_ANON_ROLE
              value: "anon"
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ project_slug }}-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgrest
spec:
  selector:
    app.kubernetes.io/name: postgrest
  ports:
    - port: 3000
      targetPort: 3000
      name: http
