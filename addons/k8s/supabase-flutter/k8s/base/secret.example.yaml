# EXAMPLE ONLY — do not commit real values. Shows the keys the API layer expects.
# Create the real Secret out-of-band, e.g.:
#   kubectl -n {{ project_slug }} create secret generic {{ project_slug }}-secrets \
#     --from-literal=PGRST_DB_URI='postgres://authenticator:pass@managed-host:5432/{{ db_name }}' \
#     --from-literal=GOTRUE_DB_DATABASE_URL='postgres://gotrue:pass@managed-host:5432/{{ db_name }}?search_path=auth' \
#     --from-literal=JWT_SECRET='CHANGE_ME_LONG_RANDOM'
# Note the GoTrue ?search_path=auth — same gotcha as local dev.
apiVersion: v1
kind: Secret
metadata:
  name: {{ project_slug }}-secrets
type: Opaque
stringData:
  PGRST_DB_URI: "postgres://authenticator:CHANGE_ME@managed-postgres:5432/{{ db_name }}"
  GOTRUE_DB_DATABASE_URL: "postgres://gotrue:CHANGE_ME@managed-postgres:5432/{{ db_name }}?search_path=auth"
  JWT_SECRET: "CHANGE_ME_LONG_RANDOM"
