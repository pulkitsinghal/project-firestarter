# EXAMPLE ONLY — do not commit real values. Shows the keys the backend expects.
# Create the real Secret out-of-band, e.g.:
#   kubectl -n {{ project_slug }} create secret generic {{ project_slug }}-secrets \
#     --from-literal=DATABASE_URL='postgresql://user:pass@managed-host:5432/{{ db_name }}' \
#     --from-literal=REDIS_URL='redis://managed-redis:6379/0'
# Better: sealed-secrets or external-secrets so nothing plaintext lands in git.
apiVersion: v1
kind: Secret
metadata:
  name: {{ project_slug }}-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:CHANGE_ME@managed-postgres:5432/{{ db_name }}"
  REDIS_URL: "redis://managed-redis:6379/0"
