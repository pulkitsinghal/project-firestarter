apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: {{ project_slug }}-production
namePrefix: prod-

resources:
  - ../../base
  - namespace.yaml
  - ingress.yaml

commonLabels:
  environment: production

images:
  - name: {{ project_slug }}-backend
    newTag: stable
  - name: {{ project_slug }}-frontend
    newTag: stable

# Production runs more replicas.
patches:
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
