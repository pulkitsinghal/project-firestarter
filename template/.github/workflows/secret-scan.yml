name: Secret Scan

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Free, no-host-SDK secret scanning via gitleaks in Docker. Blocks a PR (and
# thus the squash-merge) if a credential is detected in the checked-out files —
# the push-protection equivalent for repos without paid GitHub Secret Protection
# (i.e. private repos on free plans). auto-merge.yml requires this check.
#
# Tune false positives with a committed .gitleaks.toml allowlist (e.g. known
# public demo tokens or test fixtures).

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: gitleaks (Docker)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:v8.30.1 dir /repo -c /repo/.gitleaks.toml --no-banner --redact --exit-code 1
