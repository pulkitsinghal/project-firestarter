name: Bug report
description: Something doesn't work as expected.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Steps to reproduce → expected → actual.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Paste any error output. Redact secrets.
      render: shell
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Docker version, branch/commit.
      placeholder: "macOS 15 · Docker 27 · master@abc1234"
