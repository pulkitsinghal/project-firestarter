blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/{{ github_owner }}/{{ github_repo }}/security/advisories/new
    about: Report a vulnerability privately. Do not open a public issue. See SECURITY.md.
  - name: Question / discussion
    url: https://github.com/{{ github_owner }}/{{ github_repo }}/discussions
    about: Ask a question or discuss an idea before filing an issue.
